<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>暂存库存 · Stash</title>
<style>
:root{
  --bg:#f4f1ea; --surface:#fbf9f4; --surface-2:#ece6da; --card:#ffffff;
  --ink:#1f1c16; --soft:#6f6857; --faint:#9a9381; --line:#e4dccd; --line-2:#d8cfbb;
  --accent:#3f8a6e; --accent-soft:#dcebe2; --accent-dim:#2f6b54;
  --warn:#b07a2e; --err:#b1492f; --ok:#3f8a6e;
  --radius:14px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px);
  --sans:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  --mono:"SFMono-Regular",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-text-size-adjust:100%}
button{font:inherit;cursor:pointer}
input,textarea{font:inherit}
.mono{font-family:var(--mono)}
.hidden{display:none!important}

/* gate */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px calc(16px + var(--sar)) 24px calc(16px + var(--sal))}
.gate .box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px 24px;width:100%;max-width:440px}
.gate h1{font-size:1.4rem;margin-bottom:6px}
.gate .lede{font-size:.86rem;color:var(--soft);margin-bottom:18px;line-height:1.6}
.field{margin-bottom:12px}
.field label{display:block;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-bottom:5px}
.field input{width:100%;background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:.62rem .7rem;color:var(--ink);font-size:16px;outline:none}
.field input:focus{border-color:var(--accent)}
.field .hint{font-size:.72rem;color:var(--faint);margin-top:4px}
/* 令牌框用星号遮罩但不是 password 类型，避免浏览器把它当登录密码反复弹「保存密码」 */
.masked{-webkit-text-security:disc;text-security:disc;font-family:var(--mono)}

/* header */
header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
  padding:calc(.6rem + var(--sat)) calc(1rem + var(--sar)) .6rem calc(1rem + var(--sal));
  background:color-mix(in oklab,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:1.05rem}
.brand .ico{font-size:1.2rem}
.grow{flex:1}
.pill{font-family:var(--mono);font-size:11px;color:var(--soft);display:flex;align-items:center;gap:6px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.dot.ok{background:var(--ok)} .dot.busy{background:var(--warn);animation:bl .9s infinite} .dot.err{background:var(--err)}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

.btn{border:1px solid var(--line-2);background:var(--surface);border-radius:9px;padding:.5rem .85rem;color:var(--ink);min-height:40px;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn.primary:hover{background:var(--accent-dim)}
.btn.sm{padding:.32rem .6rem;min-height:34px;font-size:.82rem}
.btn.ghost{background:transparent}
.btn.danger{color:var(--err);border-color:#e3b3a6}
.btn:disabled{opacity:.5;cursor:not-allowed}

main{max-width:940px;margin:0 auto;padding:1rem calc(1rem + var(--sar)) calc(3rem + var(--sab)) calc(1rem + var(--sal))}
.toolbar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.search{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--line-2);border-radius:10px;padding:.6rem .8rem;font-size:16px;color:var(--ink);outline:none}
.search:focus{border-color:var(--accent)}
.summary{font-family:var(--mono);font-size:11px;color:var(--soft);margin-bottom:.8rem}

.addr{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden}
.addr-hd{display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem;background:var(--surface-2);border-bottom:1px solid var(--line);flex-wrap:wrap}
.addr-hd .nm{font-weight:600;font-size:1.02rem;display:flex;align-items:center;gap:.45rem;flex:1;min-width:120px}
.addr-hd .ct{font-family:var(--mono);font-size:11px;color:var(--soft);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:.1rem .5rem}
.addr-body{padding:.7rem .8rem 1rem}
.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem}
.item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:.7rem;display:flex;flex-direction:column;gap:.45rem}
.item .thumbs{display:flex;gap:.3rem;flex-wrap:wrap}
.item .thumbs img{width:46px;height:46px;object-fit:cover;border-radius:7px;border:1px solid var(--line-2);cursor:zoom-in;background:var(--surface-2)}
.item .nm{font-weight:600;font-size:.95rem;word-break:break-word}
.item .qty{font-family:var(--mono);font-size:.82rem;color:var(--accent-dim);font-weight:600}
.item .nt{font-size:.78rem;color:var(--soft);word-break:break-word}
.item .row{display:flex;gap:.4rem;margin-top:auto}
.item-add{border:1.5px dashed var(--line-2);background:transparent;border-radius:11px;min-height:88px;color:var(--soft);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.item-add:hover{border-color:var(--accent);color:var(--accent)}
.empty{color:var(--soft);text-align:center;padding:2rem 1rem;font-size:.92rem}

/* save bar */
.savebar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;align-items:center;gap:.8rem;
  padding:.65rem calc(1rem + var(--sar)) calc(.65rem + var(--sab)) calc(1rem + var(--sal));
  background:color-mix(in oklab,var(--bg) 92%,transparent);backdrop-filter:blur(10px);border-top:1px solid var(--line)}
.savebar .st{font-family:var(--mono);font-size:11px;color:var(--soft)}

/* modal */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(20,16,10,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:620px){.overlay.open{align-items:center}}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:92vh;overflow:auto;
  padding:1.1rem 1.1rem calc(1.1rem + var(--sab))}
@media(min-width:620px){.modal{border-radius:16px}}
.modal h2{font-size:1.2rem;margin-bottom:.9rem}
.modal .field input,.modal .field textarea{width:100%;background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:.6rem .7rem;font-size:16px;color:var(--ink);outline:none}
.modal .field textarea{resize:vertical;min-height:54px}
.modal .field input:focus,.modal .field textarea:focus{border-color:var(--accent)}
.modal-foot{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap}
.modal-foot .grow{flex:1}

/* image picker in modal */
.imgs{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem}
.imgs .ph{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--line-2)}
.imgs .ph img{width:100%;height:100%;object-fit:cover;display:block}
.imgs .ph .x{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,.6);color:#fff;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center}
.imgs .addimg{width:72px;height:72px;border:1.5px dashed var(--line-2);border-radius:9px;background:transparent;color:var(--soft);font-size:1.4rem;display:flex;align-items:center;justify-content:center}
.imgs .addimg:hover{border-color:var(--accent);color:var(--accent)}

/* lightbox */
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px}

#toast{position:fixed;left:50%;bottom:calc(74px + var(--sab));transform:translateX(-50%) translateY(20px);z-index:99;
  background:var(--ink);color:#fff;padding:.6rem 1rem;border-radius:10px;font-size:.85rem;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--err)}
</style>
</head>
<body>

<!-- 连接设置 -->
<div class="gate" id="gate">
  <div class="box">
    <h1>📦 暂存库存</h1>
    <p class="lede">记录你暂时放在各处房子的物品（地址 · 物品 · 数量 · 图片）。数据存在你私有仓库的 <span class="mono">storage.json</span>，仅本机保存令牌。若已在导航站配过，下面会自动带出，直接点连接即可。</p>
    <div class="field"><label>仓库 Owner</label><input id="gOwner" placeholder="NickkkLian" autocomplete="off" autocapitalize="off" autocorrect="off"></div>
    <div class="field"><label>私有仓库名</label><input id="gRepo" placeholder="Database" autocomplete="off" autocapitalize="off" autocorrect="off"></div>
    <div class="field"><label>文件路径</label><input id="gPath" value="storage.json" autocomplete="off" autocapitalize="off" autocorrect="off"></div>
    <div class="field"><label>Fine-grained Token（Contents 读写）</label><input id="gToken" type="text" class="masked" name="pha-token-nosave" placeholder="github_pat_…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"><div class="hint">仅存本机浏览器，不上传、不进代码。</div></div>
    <button class="btn primary" id="gConnect" style="width:100%;justify-content:center;margin-top:.4rem">连接并载入</button>
    <p class="st mono" id="gStat" style="margin-top:.6rem;font-size:11px;color:var(--soft)"></p>
  </div>
</div>

<!-- 应用 -->
<div id="app" class="hidden">
  <header>
    <span class="brand"><span class="ico">📦</span> 暂存库存</span>
    <span class="grow"></span>
    <span class="pill"><span class="dot" id="dot"></span><span id="sync">本地</span></span>
    <button class="btn sm ghost" id="reload">↻</button>
    <button class="btn sm ghost" id="settings">⚙</button>
  </header>

  <main>
    <div class="toolbar">
      <input class="search" id="search" placeholder="搜地址 / 物品 / 备注…">
      <button class="btn primary" id="addAddr">+ 新增存放点</button>
    </div>
    <div class="summary" id="summary"></div>
    <div id="list"></div>
  </main>

  <div class="savebar">
    <button class="btn primary" id="save">保存到 GitHub</button>
    <span class="st" id="saveSt"></span>
    <span class="grow"></span>
    <span class="st">改动会自动暂存本机</span>
  </div>
</div>

<!-- 地址编辑 -->
<div class="overlay" id="addrModal">
  <div class="modal">
    <h2 id="addrTitle">存放点</h2>
    <div class="field"><label>地址 / 名称</label><input id="aName" placeholder="如：上海·徐汇老房 / 父母家储藏间"></div>
    <div class="field"><label>备注（可选）</label><textarea id="aNote" placeholder="楼层、房间、联系人…"></textarea></div>
    <div class="modal-foot">
      <button class="btn danger" id="aDelete">删除</button>
      <span class="grow"></span>
      <button class="btn" id="aCancel">取消</button>
      <button class="btn primary" id="aSave">保存</button>
    </div>
  </div>
</div>

<!-- 物品编辑 -->
<div class="overlay" id="itemModal">
  <div class="modal">
    <h2 id="itemTitle">物品</h2>
    <div class="field"><label>物品名称</label><input id="iName" placeholder="如：冬被 / 投影仪 / 纸箱A"></div>
    <div class="field"><label>数量</label><input id="iQty" type="number" min="0" step="1" placeholder="1"></div>
    <div class="field"><label>备注（可选）</label><textarea id="iNote" placeholder="型号、状态、何时取回…"></textarea></div>
    <div class="field"><label>图片（最多 3 张）</label>
      <div class="imgs" id="iImgs"></div>
      <input type="file" id="iFile" accept="image/*" multiple class="hidden">
    </div>
    <div class="modal-foot">
      <button class="btn danger" id="iDelete">删除</button>
      <span class="grow"></span>
      <button class="btn" id="iCancel">取消</button>
      <button class="btn primary" id="iSave">保存</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>
<div id="toast"></div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* 存储兜底（预览环境可能禁用 localStorage） */
const mem={};
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return k in mem?mem[k]:null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}},
  del(k){try{localStorage.removeItem(k)}catch(e){delete mem[k]}}
};

const CFG_KEY="storage_cfg", CACHE_KEY="storage_cache";
let cfg={owner:"",repo:"",branch:"main",path:"storage.json",token:""};
let data={version:1,updatedAt:null,addresses:[]};
let fileSha=null, dirty=false, saveTimer=null, q="";

/* ---- 配置 ---- */
(function initCfg(){
  const raw=store.get(CFG_KEY);
  if(raw){try{cfg=Object.assign(cfg,JSON.parse(raw))}catch(e){}}
  /* [hub-portal] 令牌为空时从共享配置 pha-config 读 owner+repo+token（附加，安全合并，不覆盖已填，不改 path） */
  try{var _pha=JSON.parse(localStorage.getItem('pha-config')||'null');if(_pha){if(!cfg.owner&&_pha.owner)cfg.owner=_pha.owner;if(!cfg.repo&&_pha.repo)cfg.repo=_pha.repo;if(!cfg.token&&_pha.token)cfg.token=_pha.token;}}catch(e){}
})();
function configured(){return cfg.owner&&cfg.repo&&cfg.token}
function saveCfg(){store.set(CFG_KEY,JSON.stringify(cfg))}

/* ---- GitHub Contents API ---- */
function apiUrl(p){return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${p.split("/").map(encodeURIComponent).join("/")}`}
function ghHeaders(){return {Authorization:"Bearer "+cfg.token,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}}
const b64encode=s=>btoa(unescape(encodeURIComponent(s)));
const b64decode=b=>decodeURIComponent(escape(atob(b.replace(/\n/g,""))));
async function ghLoad(){
  const r=await fetch(apiUrl(cfg.path)+"?ref="+encodeURIComponent(cfg.branch||"main"),{headers:ghHeaders()});
  if(r.status===404){fileSha=null;return {version:1,updatedAt:null,addresses:[]}}
  if(r.status===401||r.status===403)throw new Error("令牌无权限或无效（"+r.status+"）");
  if(!r.ok)throw new Error("HTTP "+r.status);
  const j=await r.json();fileSha=j.sha;
  return normalize(JSON.parse(b64decode(j.content)));
}
async function ghSave(){
  data.updatedAt=new Date().toISOString();
  const body={message:`storage: update ${new Date().toISOString().slice(0,16).replace("T"," ")}`,content:b64encode(JSON.stringify(data,null,2)+"\n"),branch:cfg.branch||"main"};
  if(fileSha)body.sha=fileSha;
  const r=await fetch(apiUrl(cfg.path),{method:"PUT",headers:{...ghHeaders(),"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(r.status===409)throw new Error("版本冲突，请先点 ↻ 重新载入");
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error("HTTP "+r.status+" "+(e.message||""))}
  fileSha=(await r.json()).content.sha;
}

/* ---- 数据规整 ---- */
function normalize(p){
  const d={version:1,updatedAt:(p&&p.updatedAt)||null,addresses:[]};
  if(p&&Array.isArray(p.addresses)){
    d.addresses=p.addresses.map(a=>({
      id:a.id||uid(),address:a.address||a.name||"",note:a.note||"",
      items:Array.isArray(a.items)?a.items.map(it=>({
        id:it.id||uid(),name:it.name||"",qty:(typeof it.qty==="number"?it.qty:(parseInt(it.qty)||0)),
        note:it.note||"",images:Array.isArray(it.images)?it.images.filter(x=>typeof x==="string").slice(0,3):[]
      })):[]
    }));
  }
  return d;
}

/* ---- 缓存 ---- */
function cacheSave(){store.set(CACHE_KEY,JSON.stringify({cfgKey:cfg.owner+"/"+cfg.repo+"/"+cfg.path,data}))}
function cacheLoad(){try{const c=JSON.parse(store.get(CACHE_KEY)||"null");if(c&&c.cfgKey===cfg.owner+"/"+cfg.repo+"/"+cfg.path)return c.data}catch(e){}return null}
function markDirty(){dirty=true;cacheSave();setSync("local","未保存");scheduleSave()}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{if(configured()&&dirty)doSave(true)},2500)}

/* ---- 状态 ---- */
function setSync(kind,text){$("#dot").className="dot"+(kind==="ok"?" ok":kind==="busy"?" busy":kind==="err"?" err":"");$("#sync").textContent=text}
function toast(msg,err){const t=$("#toast");t.textContent=msg;t.className="show"+(err?" err":"");setTimeout(()=>t.className=t.className.replace("show","").trim(),2200)}

/* ---- 连接 / 载入 ---- */
function fillGate(){$("#gOwner").value=cfg.owner;$("#gRepo").value=cfg.repo;$("#gPath").value=cfg.path||"storage.json";$("#gToken").value=cfg.token}
async function connect(){
  cfg.owner=$("#gOwner").value.trim();cfg.repo=$("#gRepo").value.trim();cfg.path=$("#gPath").value.trim()||"storage.json";cfg.token=$("#gToken").value.trim();
  if(!configured()){$("#gStat").textContent="请填 Owner / Repo / Token";return}
  saveCfg();$("#gStat").textContent="连接中…";
  try{
    data=await ghLoad();dirty=false;cacheSave();
    $("#gate").classList.add("hidden");$("#app").classList.remove("hidden");
    setSync("ok","已同步");render();toast("已载入 "+itemCount()+" 件物品");
  }catch(e){
    const cached=cacheLoad();
    if(cached){data=cached;$("#gate").classList.add("hidden");$("#app").classList.remove("hidden");setSync("err","离线·本地缓存");render();toast("载入失败，显示本地缓存："+e.message,true)}
    else $("#gStat").textContent="载入失败："+e.message;
  }
}
async function doSave(silent){
  if(!configured()){toast("未配置，无法保存",true);return}
  setSync("busy","保存中…");$("#save").disabled=true;$("#saveSt").textContent="保存中…";
  try{await ghSave();dirty=false;cacheSave();setSync("ok","已同步");$("#saveSt").textContent="已保存 ✓";if(!silent)toast("已保存到 GitHub ✓")}
  catch(e){setSync("err","保存失败");$("#saveSt").textContent="";toast("保存失败："+e.message,true)}
  finally{$("#save").disabled=false}
}

/* ---- 统计 ---- */
function itemCount(){return data.addresses.reduce((a,x)=>a+x.items.length,0)}
function totalQty(){return data.addresses.reduce((a,x)=>a+x.items.reduce((s,it)=>s+(it.qty||0),0),0)}

/* ---- 渲染 ---- */
function matchAddr(a){if(!q)return true;const hay=(a.address+" "+a.note+" "+a.items.map(it=>it.name+" "+it.note).join(" ")).toLowerCase();return hay.includes(q)}
function render(){
  const list=$("#list");
  $("#summary").textContent=`${data.addresses.length} 个存放点 · ${itemCount()} 件物品 · 合计数量 ${totalQty()}`;
  const addrs=data.addresses.filter(matchAddr);
  if(!data.addresses.length){list.innerHTML=`<div class="empty">还没有存放点。<br>点右上「+ 新增存放点」开始记录。</div>`;return}
  if(!addrs.length){list.innerHTML=`<div class="empty">没有匹配「${esc(q)}」的结果。</div>`;return}
  list.innerHTML=addrs.map(a=>`
    <div class="addr" data-a="${a.id}">
      <div class="addr-hd">
        <span class="nm">📍 ${esc(a.address||"未命名存放点")}</span>
        <span class="ct">${a.items.length} 件</span>
        <button class="btn sm ghost" data-editaddr="${a.id}">编辑</button>
      </div>
      <div class="addr-body">
        ${a.note?`<div class="item nt" style="border:none;background:none;padding:0 0 .6rem;color:var(--soft);font-size:.82rem">📝 ${esc(a.note)}</div>`:""}
        <div class="items">
          ${a.items.map(it=>itemCardHTML(a.id,it)).join("")}
          <button class="item-add" data-additem="${a.id}">+ 添加物品</button>
        </div>
      </div>
    </div>`).join("");
  list.querySelectorAll("[data-editaddr]").forEach(b=>b.onclick=()=>openAddr(b.dataset.editaddr));
  list.querySelectorAll("[data-additem]").forEach(b=>b.onclick=()=>openItem(b.dataset.additem,null));
  list.querySelectorAll("[data-edititem]").forEach(b=>b.onclick=()=>openItem(b.dataset.aid,b.dataset.edititem));
  list.querySelectorAll("[data-zoom]").forEach(img=>img.onclick=()=>{$("#lightboxImg").src=img.dataset.zoom;$("#lightbox").classList.add("open")});
}
function itemCardHTML(aid,it){
  return `<div class="item">
    ${it.images.length?`<div class="thumbs">${it.images.map(src=>`<img data-zoom="${src}" src="${src}" alt="">`).join("")}</div>`:""}
    <div class="nm">${esc(it.name||"未命名")}</div>
    <div class="qty">× ${it.qty||0}</div>
    ${it.note?`<div class="nt">${esc(it.note)}</div>`:""}
    <div class="row"><button class="btn sm ghost" data-edititem="${it.id}" data-aid="${aid}">编辑</button></div>
  </div>`;
}

/* ---- 地址编辑 ---- */
let editAddrId=null;
function openAddr(id){
  editAddrId=id;const a=id?data.addresses.find(x=>x.id===id):null;
  $("#addrTitle").textContent=a?"编辑存放点":"新增存放点";
  $("#aName").value=a?a.address:"";$("#aNote").value=a?a.note:"";
  $("#aDelete").style.display=a?"":"none";
  $("#addrModal").classList.add("open");$("#aName").focus();
}
$("#aCancel").onclick=()=>$("#addrModal").classList.remove("open");
$("#aSave").onclick=()=>{
  const name=$("#aName").value.trim();if(!name){toast("填一下地址/名称",true);return}
  if(editAddrId){const a=data.addresses.find(x=>x.id===editAddrId);a.address=name;a.note=$("#aNote").value.trim()}
  else data.addresses.unshift({id:uid(),address:name,note:$("#aNote").value.trim(),items:[]});
  markDirty();$("#addrModal").classList.remove("open");render();
};
$("#aDelete").onclick=()=>{
  if(!editAddrId)return;const a=data.addresses.find(x=>x.id===editAddrId);
  if(!confirm(`删除存放点「${a.address}」及其 ${a.items.length} 件物品？`))return;
  data.addresses=data.addresses.filter(x=>x.id!==editAddrId);markDirty();$("#addrModal").classList.remove("open");render();
};

/* ---- 物品编辑 ---- */
let editAid=null,editItemId=null,workImages=[];
function openItem(aid,itemId){
  editAid=aid;editItemId=itemId;
  const it=itemId?data.addresses.find(x=>x.id===aid).items.find(i=>i.id===itemId):null;
  $("#itemTitle").textContent=it?"编辑物品":"添加物品";
  $("#iName").value=it?it.name:"";$("#iQty").value=it?(it.qty||0):1;$("#iNote").value=it?it.note:"";
  workImages=it?it.images.slice():[];renderWorkImages();
  $("#iDelete").style.display=it?"":"none";
  $("#itemModal").classList.add("open");$("#iName").focus();
}
function renderWorkImages(){
  const box=$("#iImgs");
  box.innerHTML=workImages.map((src,i)=>`<div class="ph"><img src="${src}" alt=""><button class="x" data-rm="${i}">✕</button></div>`).join("")
    +(workImages.length<3?`<button class="addimg" id="addImgBtn">＋</button>`:"");
  box.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{workImages.splice(+b.dataset.rm,1);renderWorkImages()});
  const add=$("#addImgBtn");if(add)add.onclick=()=>$("#iFile").click();
}
$("#iFile").onchange=async e=>{
  const files=[...e.target.files].slice(0,3-workImages.length);
  for(const f of files){
    if(workImages.length>=3)break;
    try{workImages.push(await compressImage(f));renderWorkImages()}catch(err){toast("图片处理失败",true)}
  }
  e.target.value="";
};
function compressImage(file,maxDim=1100,quality=0.72){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file),img=new Image();
    img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight;
      if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      try{res(c.toDataURL("image/jpeg",quality))}catch(e){rej(e)}};
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("read fail"))};
    img.src=url;
  });
}
$("#iCancel").onclick=()=>$("#itemModal").classList.remove("open");
$("#iSave").onclick=()=>{
  const name=$("#iName").value.trim();if(!name){toast("填一下物品名称",true);return}
  const qty=Math.max(0,parseInt($("#iQty").value)||0),note=$("#iNote").value.trim();
  const addr=data.addresses.find(x=>x.id===editAid);if(!addr)return;
  if(editItemId){const it=addr.items.find(i=>i.id===editItemId);it.name=name;it.qty=qty;it.note=note;it.images=workImages.slice(0,3)}
  else addr.items.push({id:uid(),name,qty,note,images:workImages.slice(0,3)});
  markDirty();$("#itemModal").classList.remove("open");render();
};
$("#iDelete").onclick=()=>{
  if(!editItemId)return;const addr=data.addresses.find(x=>x.id===editAid);
  const it=addr.items.find(i=>i.id===editItemId);
  if(!confirm(`删除物品「${it.name}」？`))return;
  addr.items=addr.items.filter(i=>i.id!==editItemId);markDirty();$("#itemModal").classList.remove("open");render();
};

/* ---- 顶层交互 ---- */
$("#addAddr").onclick=()=>openAddr(null);
$("#search").oninput=e=>{q=e.target.value.trim().toLowerCase();render()};
$("#save").onclick=()=>doSave(false);
$("#reload").onclick=async()=>{if(dirty&&!confirm("有未保存改动，重新载入会丢弃，继续？"))return;setSync("busy","载入中…");try{data=await ghLoad();dirty=false;cacheSave();setSync("ok","已同步");render();toast("已重新载入")}catch(e){setSync("err","载入失败");toast("载入失败："+e.message,true)}};
$("#settings").onclick=()=>{fillGate();$("#app").classList.add("hidden");$("#gate").classList.remove("hidden");$("#gStat").textContent=""};
$("#gConnect").onclick=connect;
$("#lightbox").onclick=()=>$("#lightbox").classList.remove("open");
[ "addrModal","itemModal" ].forEach(id=>$("#"+id).addEventListener("click",e=>{if(e.target.id===id)$("#"+id).classList.remove("open")}));
document.addEventListener("keydown",e=>{if(e.key==="Escape"){["addrModal","itemModal"].forEach(id=>$("#"+id).classList.remove("open"));$("#lightbox").classList.remove("open")}});

/* ---- 启动 ---- */
(function boot(){
  fillGate();
  const cached=cacheLoad();if(cached)data=cached;
  if(configured()){
    $("#gate").classList.add("hidden");$("#app").classList.remove("hidden");
    if(cached){render();setSync("ok","本地缓存")}
    connect();
  }
})();
</script>
</body>
</html>
